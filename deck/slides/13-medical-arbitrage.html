<!DOCTYPE html>

<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .content { position: absolute; top: 150px; left: 110px; right: 110px; display: grid; grid-template-columns: 1fr 900px; column-gap: 100px; }

  .row .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }

  .row .val { font-family: var(--mono); font-size: 48px; font-weight: 500; }
  .row .track { height: 54px; background: var(--paper-warm); border-radius: 6px; overflow: hidden; }
  .row .fill { height: 100%; border-radius: 6px; }
  .row.med .val { color: var(--clay-deep); }
  .row.med .fill { width: 100%; background: var(--clay); }
  .row.sw .val { color: var(--muted); }
  .row.sw .fill { width: 8.7%; background: var(--muted); }

  <div class="masthead"><span class="brand">把 Claude Code 變成你的<b>第二大腦</b></span><span>05 · SKILL</span></div>

    </div>
